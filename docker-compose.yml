# D-BEST TimeSmart Docker Compose Configuration
# Timeclock-D-Best instance

services:
  app:
    image: dbest25/timesmart:latest
    container_name: Timeclock-D-Best
    restart: unless-stopped

    # Map host.docker.internal to the Docker host for DB access
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Volume mounts for development
    # Application code is mounted from host for live updates
    volumes:
      - ./app:/var/www/html:rw
      - ./deploy/docker/nginx.conf:/etc/nginx/sites-available/default:ro
      - ./deploy/docker/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro

    # Environment variables for database connection
    environment:
      DB_HOST: host.docker.internal
      DB_NAME: timeclock-D-Best
      DB_USER: timeclock
      DB_PASS: SecureNet25!
      DB_TIMEZONE: America/Chicago

    # Shared network allows NPM to reach this container by name
    networks:
      - timesmart-net

networks:
  timesmart-net:
    external: true
